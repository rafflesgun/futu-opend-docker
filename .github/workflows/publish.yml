name: Publish Docker image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!README.md'
              - '!LICENSE'
              - '!.github/workflows/lint.yml'

  build:
    needs: check-paths
    if: needs.check-paths.outputs.should-build == 'true'
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image
        run: |
          echo "tag=${IMAGE_NAME}:${GITHUB_SHA}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true
          platforms: linux/${{ matrix.arch }}
          build-args: |
            TARGETARCH=${{ matrix.arch }}
          tags: ${{ steps.image.outputs.tag }}

      - name: Validate Docker image
        run: |
          set -eu

          image="${{ steps.image.outputs.tag }}"

          docker run --rm --entrypoint /bin/sh "$image" -c '
            command -v futu-opend
            command -v futu-mcp
            command -v futucli
          '

          docker network create futu-ci

          cleanup() {
            docker logs futu-opend-test 2>/dev/null || true
            docker logs futu-mcp-test 2>/dev/null || true
            docker rm -f futu-mcp-test futu-opend-test 2>/dev/null || true
            docker network rm futu-ci 2>/dev/null || true
          }
          trap cleanup EXIT

          docker run -d \
            --name futu-opend-test \
            --network futu-ci \
            -v "$PWD/examples/futu-opend.toml:/etc/futu-opend/futu-opend.toml:ro" \
            -v "$PWD/examples/keys.json:/etc/futu-opend/keys.json:ro" \
            "$image"

          timeout 45s sh -c '
            until docker exec futu-opend-test curl -fsS http://127.0.0.1:22222/health >/dev/null; do
              sleep 2
            done
          '

          docker inspect --format='{{.State.Status}}' futu-opend-test | grep -qx running

          docker run -d \
            --name futu-mcp-test \
            --network futu-ci \
            --entrypoint /usr/local/bin/entrypoint-mcp.sh \
            -v "$PWD/examples/futu-mcp.toml:/etc/futu-opend/futu-mcp.toml:ro" \
            -v "$PWD/examples/keys.json:/etc/futu-opend/keys.json:ro" \
            "$image"

          timeout 45s sh -c '
            until docker exec futu-mcp-test curl -fsS -H "Accept: text/event-stream" http://127.0.0.1:38765/mcp >/dev/null; do
              sleep 2
            done
          '

          docker inspect --format='{{.State.Status}}' futu-mcp-test | grep -qx running

      - name: Push Docker image
        run: docker push '${{ steps.image.outputs.tag }}'
